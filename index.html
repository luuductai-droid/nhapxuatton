<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventory Scanner PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <div id="app">
        <!-- Language Selector -->
        <div class="language-selector">
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
            <button class="lang-btn" data-lang="vi">🇻🇳 Tiếng Việt</button>
        </div>
        <header class="app-header">

    <div class="logo-area">
        <img src="assets/images/logo.png" class="logo">
        <h1>Inventory Scanner</h1>
    </div>

    <div class="connection-status" id="connectionStatus">
        ● Online
    </div>

</header>

        <!-- Main Navigation -->
        <nav class="main-nav">
            <button class="nav-btn active" data-view="dashboard" data-i18n="dashboard">📊 Dashboard</button>
            <button class="nav-btn" data-view="inventory" data-i18n="inventory">📦 Inventory</button>
            <button class="nav-btn" data-view="scanner" data-i18n="scanner">📷 Scanner</button>
        </nav>
        <div class="nav-tabs">
<div id="dashboardPage">
    <!-- dashboard -->
</div>

<div id="inventoryPage" style="display:none;">
    <!-- inventory -->
</div>

<div id="scannerPage" style="display:none;">
    <!-- scanner -->
</div>
</div>
        <!-- Dashboard View -->
        <div id="dashboard-view" class="view active">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label" data-i18n="totalProducts">Total Products</span>
                    <span class="stat-value" id="totalProducts">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label" data-i18n="lowStock">Low Stock</span>
                    <span class="stat-value" id="lowStockCount">0</span>
                </div>
            </div>

            <div class="recent-activity">
                <h3 data-i18n="recentActivity">Recent Activity</h3>
                <div id="recentActivityList" class="activity-list">
                    <!-- Recent activities will be populated here -->
                </div>
            </div>
        </div>

        <!-- Inventory View -->
        <div id="inventory-view" class="view">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search products..." data-i18n-placeholder="searchPlaceholder">
                <button id="exportBtn" class="btn-secondary" data-i18n="export">Export CSV</button>
            </div>
            
            <div id="inventoryList" class="inventory-list">
                <!-- Inventory items will be populated here -->
            </div>
        </div>

        <!-- Scanner View -->
        <div id="scanner-view" class="view">
            <div id="scanner-container" class="scanner-container">
                <div id="reader" style="width: 100%;"></div>
            </div>
            
            <div class="scanner-controls">
                <button id="startScanBtn" class="btn-primary" data-i18n="startScan">Start Scanning</button>
                <button id="stopScanBtn" class="btn-secondary" data-i18n="stopScan">Stop Scanning</button>
            </div>

            <div id="scanResult" class="scan-result">
                <!-- Scan results will be shown here -->
            </div>
        </div>

        <!-- Add Product Modal -->
        <div id="productModal" class="modal">
            <div class="modal-content">
                <h2 data-i18n="addProduct">Add Product</h2>
                <form id="productForm">
                    <input type="hidden" id="modalBarcode">
                    
                    <div class="form-group">
                        <label data-i18n="barcode">Barcode</label>
                        <input type="text" id="modalBarcodeDisplay" readonly>
                    </div>
                    
                    <div class="form-group">
                        <label data-i18n="productName">Product Name</label>
                        <input type="text" id="productName" required>
                    </div>
                    
                    <div class="form-group">
                        <label data-i18n="initialQuantity">Initial Quantity</label>
                        <input type="number" id="initialQuantity" min="0" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label data-i18n="notes">Notes</label>
                        <textarea id="notes" rows="2"></textarea>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal()" data-i18n="cancel">Cancel</button>
                        <button type="submit" class="btn-primary" data-i18n="save">Save</button>
                    </div>
                    <div class="form-group">

<label>📦 Product Name</label>

<input type="text" id="productName">

</div>
                    <div class="form-group">

<label>🔢 Quantity</label>

<input type="number" id="initialQuantity">

</div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="libs/html5-qrcode.min.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/google-sheets-api.js"></script>
    <script src="js/barcode-scanner.js"></script>
    <script src="js/app.js"></script>
    <script src="js/navigation.js"></script>
<script src="js/language.js"></script>
</body>
</html>
